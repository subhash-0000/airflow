name: Validate Docs Currency

on:
  schedule:
    # Run monthly on the 1st at 00:30 UTC
    - cron: '30 0 1 * *'
  workflow_dispatch:

jobs:
  validate-skills:
    name: Validate Agent Skills
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install any dependencies needed for validation
          pip install pyyaml jsonschema

      - name: Validate agent skills
        run: |
          python scripts/ci/prek/validate_docs_currency.py

      - name: Report results
        if: always()
        run: |
          echo "## Skills Validation Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Validation completed at $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "For details, see: [skills.json](.github/skills/breeze-contribution/skills.json)" >> $GITHUB_STEP_SUMMARY

      - name: Alert if validation fails
        if: failure()
        run: |
          echo "❌ Skills validation failed!"
          echo "Skills may be outdated or commands may be invalid."
          echo "Please review and update .github/skills/breeze-contribution/skills.json"
          exit 1
